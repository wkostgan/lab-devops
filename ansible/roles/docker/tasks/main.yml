- name: remove old docker
  apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent

- name: install dependencies
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes

- name: create keyrings dir
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: add docker gpg key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: add docker repo
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: |
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable

- name: update apt
  apt:
    update_cache: yes

- name: install docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present

- name: enable docker
  systemd:
    name: docker
    enabled: yes
    state: started

- name: add user to docker group
  user:
    name: "{{ docker_user }}"
    groups: docker
    append: yes
